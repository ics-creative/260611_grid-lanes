<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>flow-tolerance | display: grid-lanes demo</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
      /* スクロールしながら値を変えられるよう、操作パネルを画面上部に固定 */
      .controls {
        position: sticky;
        top: 0;
        background: #fff;
        z-index: 10;
        padding: 8px 0;
        margin-bottom: 0;
      }

      .lanes {
        display: grid-lanes;
        grid-template-columns: repeat(auto-fill, minmax(min(144px, 30%), 1fr));
        gap: 6px;
        /* スライダーで書き換える吸着の許容幅 */
        flow-tolerance: var(--flow-tolerance, 1em);

        .card:focus-visible {
          outline: 3px solid var(--accent);
          outline-offset: 2px;
        }
      }
    </style>
  </head>
  <body>

    <div class="controls">
      <label>flow-tolerance: <strong id="valLabel">1.0em</strong></label>
      <input id="tol" type="range" min="0" max="4" step="0.1" value="1" />
    </div>

    <div class="lanes" id="stage" style="--flow-tolerance: 1em"></div>


    <script>
      const stage = document.getElementById("stage");
      // hue=(i*31)%360, h=90+((i*17)%30) — 高さが近いカード群
      for (let i = 0; i < 18; i++) {
        const card = document.createElement("div");
        card.className = "card";
        card.tabIndex = 0;
        card.style.height = 90 + ((i * 17) % 30) + "px";
        card.style.background = `hsl(${(i * 31) % 360} 60% 80%)`;
        card.innerHTML = `<span class="badge">#${i + 1}</span>`;
        stage.append(card);
      }

      const tol = document.getElementById("tol");
      const label = document.getElementById("valLabel");
      tol.addEventListener("input", () => {
        stage.style.setProperty("--flow-tolerance", tol.value + "em");
        label.textContent = Number(tol.value).toFixed(1) + "em";
      });
    </script>
  </body>
</html>

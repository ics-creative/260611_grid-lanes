<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CSS Columns の限界 | display: grid-lanes デモ</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
      /* テキスト段組み用の column-* をメイソンリーに流用した例 */
      .legacy-columns {
        column-count: auto;
        column-width: 128px;
        column-gap: 8px;
      }
      .legacy-columns .card {
        break-inside: avoid;
        margin-bottom: 8px;
      }
      /* Tab でフォーカス順を体感できるようにする */
      .legacy-columns .card:focus-visible {
        outline: 3px solid var(--accent);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <p class="demo-head">
      <code>column-count</code> /
      <code>column-width</code> によるメイソンリー「風」レイアウト
    </p>

    <div class="legacy-columns" id="stage"></div>

    <p class="hint">
      カードを <kbd>Tab</kbd> でたどると、フォーカスが
      <strong>列ごとに縦移動</strong>
      します（#1→#2→…と列を下まで進んでから次の列へ）。DOM
      順＝読み上げ順と視覚順がズレるため、
      キーボード操作・スクリーンリーダー体験が不自然になります。
    </p>

    <script>
      const stage = document.getElementById("stage");
      // hue=(i*29)%360, h=70+((i*41)%140)
      for (let i = 0; i < 12; i++) {
        const card = document.createElement("div");
        card.className = "card";
        card.tabIndex = 0;
        card.style.height = 70 + ((i * 41) % 140) + "px";
        card.style.background = `hsl(${(i * 29) % 360} 55% 82%)`;
        card.innerHTML = `<span class="badge">#${i + 1}</span>`;
        stage.append(card);
      }
    </script>
  </body>
</html>

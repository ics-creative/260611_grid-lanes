<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GSAP Flip で並び替え遷移 | display: grid-lanes デモ</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
      .lanes {
        display: grid-lanes;
        grid-template-columns: repeat(auto-fill, minmax(112px, 1fr));
        gap: 8px;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/Flip.min.js"></script>
  </head>
  <body>
    <p class="demo-head">
      <strong>FLIP</strong>（First-Last-Invert-Play）を
      <code>Flip.from()</code> 一発で。配置は <code>grid-lanes</code> 任せ
    </p>

    <div class="controls">
      <button id="shuffle">並び替え（FLIP）</button>
      <button id="resize">1 枚の高さを変える</button>
    </div>

    <div class="lanes" id="stage"></div>

    <p class="hint">
      並び替えても高さを変えても、<code>grid-lanes</code>
      が再配置した「新しい位置」へ GSAP がなめらかに補間します。
    </p>

    <script>
      gsap.registerPlugin(Flip);

      const stage = document.getElementById("stage");

      // カードの DOM 要素は一度だけ作る。
      // GSAP Flip は「同じ要素」が移動したものとして補間するため、
      // 並び替え時に要素を作り直さず、既存要素を移動させるのがポイント。
      // hue=(i*47)%360, h=80+((i*37)%120)
      let cards = Array.from({ length: 10 }, (_, i) => {
        const id = i + 1;
        const h = 80 + ((i * 37) % 120);
        const el = document.createElement("div");
        el.className = "card";
        el.dataset.id = id;
        el.style.height = h + "px";
        el.style.background = `hsl(${(i * 47) % 360} 60% 80%)`;
        el.innerHTML = `<span class="badge">#${id}</span>`;
        stage.append(el);
        return { id, el, h };
      });

      // absoluteオプションは対象を絶対配置にするので、アニメ中はコンテナーの高さが
      // 潰れて下のテキストが上下に跳ねる。アニメ中だけ高さを固定して防ぐ。
      const lockHeight = () => {
        stage.style.minHeight = stage.getBoundingClientRect().height + "px";
      };
      const unlockHeight = () => {
        stage.style.minHeight = "";
      };

      document.getElementById("shuffle").addEventListener("click", () => {
        const state = Flip.getState(stage.querySelectorAll(".card")); // 位置を記録
        cards = [...cards].sort(() => Math.random() - 0.5); // 配列をシャッフル
        for (const c of cards) stage.append(c.el); // 既存要素を新しい順序で並べ替え（移動）
        lockHeight(); // アニメ中の高さ潰れ（下の要素の跳ね）を防ぐ
        Flip.from(state, {
          // 記録位置 → 新位置へ補間
          duration: 0.6,
          ease: "power2.inOut",
          absolute: true,
          stagger: 0.02,
          onComplete: unlockHeight
        });
      });

      document.getElementById("resize").addEventListener("click", () => {
        const victim = cards[Math.floor(Math.random() * cards.length)];
        if (!victim) return;
        const state = Flip.getState(stage.querySelectorAll(".card"));
        victim.h = 70 + Math.floor(Math.random() * 160);
        victim.el.style.height = victim.h + "px"; // 既存要素の高さだけ変える
        lockHeight(); // アニメ中の高さ潰れ（下の要素の跳ね）を防ぐ
        Flip.from(state, {
          duration: 0.5,
          ease: "power2.inOut",
          absolute: true,
          onComplete: unlockHeight
        });
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>waterfall vs brick | display: grid-lanes demo</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
      .lanes {
        container-type: inline-size;

        /* waterfall = 縦方向のメイソンリー（列を定義） */
        &.columns {
          display: grid-lanes;
          grid-template-columns: repeat(3, 1fr);
          gap: 8px;
        }

        /* brick = 横方向のメイソンリー（行を定義） */
        &.rows {
          display: grid-lanes;
          grid-template-rows: repeat(4, minmax(48px, auto));
          align-items: start;
          gap: 8px;
          width: 100%;
          overflow: hidden;

          .card {
            width: calc((100cqi - 16px) / 3);
          }
        }
      }
    </style>
  </head>
  <body>

    <div class="controls">
      <label>
        <input type="radio" name="dir" value="columns" checked />
        waterfall (grid-template-columns)
      </label>
      <label>
        <input type="radio" name="dir" value="rows" />
        brick (grid-template-rows)
      </label>
    </div>

    <div class="lanes columns" id="stage"></div>

    <script>
      const stage = document.getElementById("stage");
      // hue=(i*47)%360, h=70+((i*43)%120)
      for (let i = 0; i < 12; i++) {
        const card = document.createElement("div");
        card.className = "card";
        card.style.height = 70 + ((i * 43) % 120) + "px";
        card.style.background = `hsl(${(i * 47) % 360} 60% 80%)`;
        card.innerHTML = `<span class="badge">#${i + 1}</span>`;
        stage.append(card);
      }

      for (const radio of document.querySelectorAll('input[name="dir"]')) {
        radio.addEventListener("change", () => {
          stage.className = "lanes " + radio.value;
        });
      }
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>waterfall vs brick | display: grid-lanes demo</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
      .lanes {
        /* waterfall = 縦方向のメイソンリー（列を定義。カードは高さがばらばら） */
        &.columns {
          display: grid-lanes;
          grid-template-columns: repeat(3, 1fr);
          gap: 8px;
        }

        /* brick = 横方向のメイソンリー（行を定義。カードは幅がばらばらで右へ流れる） */
        &.rows {
          display: grid-lanes;
          grid-template-rows: repeat(3, 96px);
          gap: 8px;
          overflow-x: auto;
        }
      }
    </style>
  </head>
  <body>

    <div class="controls">
      <label>
        <input type="radio" name="dir" value="columns" checked />
        waterfall (grid-template-columns)
      </label>
      <label>
        <input type="radio" name="dir" value="rows" />
        brick (grid-template-rows)
      </label>
    </div>

    <div class="lanes columns" id="stage"></div>

    <script>
      const stage = document.getElementById("stage");
      // waterfall では高さ(h)が、brick では幅(w)がばらつく
      const cards = [];
      for (let i = 0; i < 14; i++) {
        const el = document.createElement("div");
        el.className = "card";
        el.style.background = `hsl(${(i * 47) % 360} 60% 80%)`;
        el.innerHTML = `<span class="badge">#${i + 1}</span>`;
        stage.append(el);
        cards.push({ el, h: 70 + ((i * 43) % 120), w: 90 + ((i * 53) % 150) });
      }

      function setMode(mode) {
        stage.className = "lanes " + mode;
        for (const c of cards) {
          if (mode === "columns") {
            // 縦積み: 高さはカード固有、幅は列トラックに任せる
            c.el.style.height = c.h + "px";
            c.el.style.width = "";
          } else {
            // 横積み: 幅はカード固有、高さは行トラックに任せる
            c.el.style.width = c.w + "px";
            c.el.style.height = "";
          }
        }
      }
      setMode("columns");

      for (const radio of document.querySelectorAll('input[name="dir"]')) {
        radio.addEventListener("change", () => setMode(radio.value));
      }
    </script>
  </body>
</html>
